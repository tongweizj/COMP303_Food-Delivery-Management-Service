<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{common/layout :: layout(~{::title}, ~{::section})}"
>
  <head>
    <title>Order Management</title>
  </head>
  <body>
    <section>
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold">Orders Control Panel</h2>
          <p class="text-muted">
            Monitor delivery status and customer transactions.
          </p>
        </div>
        <a th:href="@{/orders/new}" class="btn btn-primary">
          <i class="bi bi-cart-plus"></i> New Order
        </a>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Order ID</th>
                <th>User ID</th>
                <th>Status</th>
                <th>Total</th>
                <th>Date</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="o : ${orders}">
                <td class="small text-secondary" th:text="${o.orderId}">ID</td>
                <td th:text="${o.userId}">User ID</td>
                <td>
                  <span
                    class="badge rounded-pill"
                    th:classappend="${o.orderStatus == 'Delivered' ? 'bg-success' : 
                                                   (o.orderStatus == 'Cancelled' ? 'bg-danger' : 
                                                   (o.orderStatus == 'Preparing' ? 'bg-info' : 'bg-warning'))}"
                    th:text="${o.orderStatus}"
                    >Status</span
                  >
                </td>
                <td>
                  <strong
                    th:text="${'$' + #numbers.formatDecimal(o.totalAmount, 1, 2)}"
                    >$0.00</strong
                  >
                </td>
                <td
                  th:text="${#temporals.format(o.orderDate, 'yyyy-MM-dd HH:mm')}"
                >
                  Date
                </td>
                <td class="text-center">
                  <div class="btn-group">
                    <a
                      th:href="@{/orders/{id}(id=${o.orderId})}"
                      class="btn btn-sm btn-outline-secondary"
                    >
                      <i class="bi bi-eye"></i>
                    </a>
                    <a
                      th:href="@{/order/delete/{id}(id=${o.orderId})}"
                      class="btn btn-sm btn-outline-danger"
                      onclick="return confirm('Cancel this order?');"
                    >
                      <i class="bi bi-trash"></i>
                    </a>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </body>
</html>
