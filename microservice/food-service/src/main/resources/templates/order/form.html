<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title th:text="${order.orderId == null ? 'Place New Order' : 'Edit Order'}">Order Form</title>
</head>
<body>

<section>
    <div class="mb-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/orders}">Orders</a></li>
                <li class="breadcrumb-item active" th:text="${order.orderId == null ? 'New' : 'Edit'}">Action</li>
            </ol>
        </nav>
        <h2 class="fw-bold" th:text="${order.orderId == null ? 'Create New Order' : 'Edit Order'}">Form Title</h2>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/order/save}" th:object="${order}" method="post">
                <input type="hidden" th:field="*{orderId}" />

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Select Customer</label>
                        <select class="form-select" th:field="*{userId}" required>
                            <option value="" disabled selected>-- Choose Customer --</option>
                            <option th:each="c : ${customers}" 
                                    th:value="${c.id}" 
                                    th:text="${c.name + ' (' + c.email + ')'}"></option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Select Restaurant</label>
                        <select class="form-select" th:field="*{restaurantId}" required>
                            <option value="" disabled selected>-- Choose Restaurant --</option>
                            <option th:each="r : ${restaurants}" 
                                    th:value="${r.restaurantId}" 
                                    th:text="${r.restaurantName}"></option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Food Items (Hold Ctrl to select multiple)</label>
                        <select class="form-select" th:field="*{foodItemIds}" multiple size="6" required>
                            <option th:each="f : ${menuItems}" 
                                    th:value="${f.menuItemId}" 
                                    th:text="${f.itemName + ' - $' + f.price}"></option>
                        </select>
                        <div class="form-text text-muted small">
                            <i class="bi bi-info-circle"></i> This will store a list of Item IDs in the database.
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Total Amount</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" class="form-control" th:field="*{totalAmount}" 
                                   placeholder="0.00" required />
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Order Status</label>
                        <select class="form-select" th:field="*{orderStatus}">
                            <option value="Placed">Placed</option>
                            <option value="Preparing">Preparing</option>
                            <option value="Delivered">Delivered</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/orders}" class="btn btn-light px-4">Cancel</a>
                    <button type="submit" class="btn btn-success px-5">
                        <i class="bi bi-cart-check me-1"></i> Confirm Order
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

</body>
</html>
