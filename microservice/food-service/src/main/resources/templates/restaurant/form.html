<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>restaurant form</title>
</head>
<body>

<section>
    <div class="mb-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/restaurants}">Restaurants</a></li>
                <li class="breadcrumb-item active" aria-current="page" 
                    th:text="${restaurant.restaurantId == null ? 'Create' : 'Edit'}">Action</li>
            </ol>
        </nav>
        <h2 class="fw-bold" th:text="${restaurant.restaurantId == null ? 'Add New Restaurant' : 'Edit Restaurant'}">Form Title</h2>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/restaurant/save}" th:object="${restaurant}" method="post">
                
                <input type="hidden" th:field="*{restaurantId}" />

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="restaurantName" class="form-label">Restaurant Name</label>
                        <input type="text" class="form-control" th:field="*{restaurantName}" 
                               placeholder="e.g. Pizza Express" required />
                    </div>

                    <div class="col-md-6">
                        <label for="cuisineType" class="form-label">Cuisine Type</label>
                        <select class="form-select" th:field="*{cuisineType}" required>
                            <option value="" selected disabled>Choose cuisine...</option>
                            <option value="Italian">Italian</option>
                            <option value="Chinese">Chinese</option>
                            <option value="Indian">Indian</option>
                            <option value="Fast Food">Fast Food</option>
                            <option value="Japanese">Japanese</option>
                            <option value="Mediterranean">Mediterranean</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="city" class="form-label">City</label>
                        <input type="text" class="form-control" th:field="*{city}" 
                               placeholder="e.g. Toronto" required />
                    </div>

                    <div class="col-md-6">
                        <label for="coverImageUrl" class="form-label">Cover Image URL</label>
                        <input type="url" class="form-control" th:field="*{coverImageUrl}" 
                               placeholder="e.g. https://example.com/restaurant.jpg" />
                    </div>

                    <div class="col-md-3">
                        <label for="deliveryTime" class="form-label">Delivery Time (mins)</label>
                        <div class="input-group">
                            <input type="number" step="1" class="form-control" th:field="*{deliveryTime}" required />
                            <span class="input-group-text">min</span>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <label for="rating" class="form-label">Rating (0-5)</label>
                        <input type="number" step="0.1" min="0" max="5" class="form-control" th:field="*{rating}" required />
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/restaurants}" class="btn btn-light px-4">Cancel</a>
                    <button type="submit" class="btn btn-primary px-5">
                        <i class="bi bi-save me-1"></i> Save Restaurant
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

</body>
</html>
