<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>Restaurant Management</title>
</head>
<body>

<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">Restaurant Management</h2>
            <p class="text-muted">Browse and manage all registered restaurants in the system.</p>
        </div>
        <a th:href="@{/restaurant/create}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Add New Restaurant
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Restaurant ID</th>
                        <th>Name</th>
                        <th>Cuisine Type</th>
                        <th>City</th>
                        <th>Rating</th>
                        <th>Delivery Time</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${restaurants}">
                        <td class="text-secondary small" th:text="${item.restaurantId}">ID</td>
                        <td>
                            <strong th:text="${item.restaurantName}">Name</strong>
                        </td>
                        <td>
                            <span class="badge bg-info text-dark" th:text="${item.cuisineType}">Cuisine</span>
                        </td>
                        <td th:text="${item.city}">City</td>
                        <td>
                            <span class="text-warning">
                                <i class="bi bi-star-fill"></i>
                            </span>
                            <span th:text="${item.rating}">0.0</span>
                        </td>
                        <td>
                            <span th:text="${item.deliveryTime}">0</span> mins
                        </td>
                        <td class="text-center">
                            <div class="btn-group" role="group">
                                <a th:href="@{/restaurant/{id}(id=${item.restaurantId})}" 
                                   class="btn btn-sm btn-outline-secondary" title="View Details">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/restaurant/edit/{id}(id=${item.restaurantId})}" 
                                   class="btn btn-sm btn-outline-primary" title="Edit">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/restaurant/delete/{id}(id=${item.restaurantId})}" 
                                   class="btn btn-sm btn-outline-danger" 
                                   onclick="return confirm('Are you sure you want to delete this restaurant?')"
                                   title="Delete">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(restaurants)}">
                        <td colspan="7" class="text-center py-5 text-muted">
                            No restaurants found. Click "Add New Restaurant" to get started.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

</body>
</html>
