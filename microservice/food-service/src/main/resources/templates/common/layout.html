<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head th:replace="~{common/head :: head(title=${title})}"></head>
<body>

<div th:replace="common/header :: header"></div>
<div class="container-fluid">
        <div class="row">
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
                <div class="sidebar-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" th:href="@{/}">
                                <i class="bi bi-house-door"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" th:href="@{/restaurant/list}">
                                <i class="bi bi-shop"></i> View Restaurants
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/menuitems}">
                                <i class="bi bi-egg-fried"></i> View Menus
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/orders}">
                                <i class="bi bi-cart"></i> View Orders
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/customers}">
                                <i class="bi bi-person-circle"></i> Customer Profile
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div th:replace="${content}"></div>
            </main>
        </div>
    </div>


<div th:replace="common/footer :: footer"></div>

</body>
</html>
