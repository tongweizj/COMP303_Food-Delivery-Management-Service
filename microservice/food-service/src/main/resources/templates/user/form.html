<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title th:text="${user?.id == null ? 'Register New User' : 'Edit User Profile'}">User Form</title>
</head>
<body>

<section>
    <div class="mb-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/users}">Users</a></li>
                <li class="breadcrumb-item active" aria-current="page" 
                    th:text="${user?.id == null ? 'Register' : 'Edit'}">Action</li>
            </ol>
        </nav>
        <h2 class="fw-bold" th:text="${user?.id == null ? 'Register New User' : 'Edit User Profile'}">Form Title</h2>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/users/save}" th:object="${user}" method="post">
                
                <input type="hidden" th:field="*{id}" />

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label fw-bold">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" th:field="*{name}" 
                                   placeholder="Enter full name" required />
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="email" class="form-label fw-bold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" th:field="*{email}" 
                                   placeholder="name@example.com" required />
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="phoneNumber" class="form-label fw-bold">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-phone"></i></span>
                            <input type="tel" class="form-control" th:field="*{phoneNumber}" 
                                   placeholder="e.g. +1 123-456-7890" />
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="role" class="form-label fw-bold">User Role</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                            <select class="form-select" th:field="*{role}" required>
                                <option value="" disabled selected>Select a role...</option>
                                <option value="USER">Standard User</option>
                                <option value="ADMIN">Administrator</option>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-12" th:if="${user?.id == null}">
                        <label for="password" class="form-label fw-bold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control" th:field="*{password}" 
                                   placeholder="Create a strong password" required />
                        </div>
                        <div class="form-text">Password will be encrypted before saving.</div>
                    </div>

                    <div class="col-12">
                        <label for="address" class="form-label fw-bold">Delivery Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                            <textarea class="form-control" th:field="*{address}" rows="3" 
                                      placeholder="Street, City, Postal Code..."></textarea>
                        </div>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/users}" class="btn btn-light px-4 border">Cancel</a>
                    <button type="submit" class="btn btn-primary px-5 shadow-sm">
                        <i class="bi bi-check-lg me-1"></i> 
                        <span th:text="${user?.id == null ? 'Create Account' : 'Update Profile'}">Save</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

</body>
</html>
