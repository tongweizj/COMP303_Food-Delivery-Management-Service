<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title th:text="${customer?.id == null ? 'Register New Customer' : 'Edit Customer Profile'}">Customer Form</title>
</head>
<body>

<section>
    <div class="mb-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/customers}">Customers</a></li>
                <li class="breadcrumb-item active" aria-current="page" 
                    th:text="${customer?.id == null ? 'Register' : 'Edit'}">Action</li>
            </ol>
        </nav>
        <h2 class="fw-bold" th:text="${customer?.id == null ? 'Register New Customer' : 'Edit Customer Profile'}">Form Title</h2>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/customer/save}" th:object="${customer}" method="post">
                
                <input type="hidden" th:field="*{id}" />

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" th:field="*{name}" 
                                   placeholder="Enter full name" required />
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" th:field="*{email}" 
                                   placeholder="name@example.com" required />
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="phoneNumber" class="form-label">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-phone"></i></span>
                            <input type="tel" class="form-control" th:field="*{phoneNumber}" 
                                   placeholder="e.g. +1 123-456-7890" required />
                        </div>
                    </div>

                    <div class="col-12">
                        <label for="address" class="form-label">Delivery Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                            <textarea class="form-control" th:field="*{address}" rows="3" 
                                      placeholder="Enter full delivery address including street, suite, and postal code" required></textarea>
                        </div>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/customers}" class="btn btn-light px-4">Cancel</a>
                    <button type="submit" class="btn btn-primary px-5">
                        <i class="bi bi-check-lg me-1"></i> Save Customer Info
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

</body>
</html>
