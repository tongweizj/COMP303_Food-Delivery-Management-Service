<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>Menu List</title>
</head>
<body>

<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">Menu Management</h2>
            <p class="text-muted">Browse and manage all menu items available in the system.</p>
        </div>
        <a th:href="@{/menuitem/create}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Add New Menu Item
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Item ID</th>
                        <th>Item Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Restaurant ID</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${menuitems}">
                        <td class="text-secondary small" th:text="${item.menuItemId}">ID</td>
                        <td>
                            <strong th:text="${item.itemName}">Item Name</strong>
                        </td>
                        <td>
                            <span class="badge bg-info text-dark" th:text="${item.category}">Category</span>
                        </td>
                        <td>
                            <span class="fw-bold" th:text="${'$' + #numbers.formatDecimal(item.price, 1, 2)}">$0.00</span>
                        </td>
                        <td>
                            <span th:if="${item.availability}" class="badge bg-success">Available</span>
                            <span th:unless="${item.availability}" class="badge bg-secondary">Sold Out</span>
                        </td>
                        <td class="text-secondary" th:text="${item.restId}">Rest ID</td>
                        <td class="text-center">
                            <div class="btn-group" role="group">
                                <a th:href="@{/menuitem/{id}(id=${item.menuItemId})}" 
                                   class="btn btn-sm btn-outline-secondary" title="View Details">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/menuitem/{id}/edit(id=${item.menuItemId})}" 
                                   class="btn btn-sm btn-outline-primary" title="Edit">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/menuitem/delete/{id}(id=${item.menuItemId})}" 
                                   class="btn btn-sm btn-outline-danger" 
                                   onclick="return confirm('Are you sure you want to delete this menu item?')"
                                   title="Delete">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${menuitems == null}">
                        <td colspan="7" class="text-center py-5 text-muted">
                            No menu items found. Click "Add New Menu Item" to get started.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

</body>
</html>
